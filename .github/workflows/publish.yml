name: Publishing

# Trigger: Run AFTER Security Scans workflow completes on main
# This ensures all security checks (including commit signature verification)
# have passed before any publishing occurs.
on:
  workflow_run:
    workflows: ["Security Scans"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

# Prevent parallel execution to avoid Convex deployment conflicts
# Only one publish workflow can run at a time for main branch
concurrency:
  group: publish-main
  cancel-in-progress: false # Don't cancel publishing in progress

jobs:
  # Gate: Verify security workflow passed before publishing
  #
  # This workflow only runs AFTER "Security Scans" completes.
  # We verify it completed successfully before proceeding.
  #
  # Security Scans includes:
  #   - CodeQL Analysis
  #   - Dependency Vulnerability Scan
  #   - Secret Scanning
  #   - Python Security Scan
  #   - API Security Scan
  #   - Commit Signature Verification (blocks unsigned commits)
  #
  verify-security-passed:
    runs-on: ubuntu-latest
    # Only proceed if security workflow succeeded
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      head_sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Security checks passed
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "  ✅ Security Checks Passed"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "📋 Commit: ${{ github.event.workflow_run.head_sha }}"
          echo "🔗 Workflow: ${{ github.event.workflow_run.html_url }}"
          echo "📊 Conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo ""
          echo "Security Scans workflow completed successfully."
          echo "Publishing is authorized to proceed."
          echo ""

  # Block publishing if security failed
  security-failed:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion != 'success'
    steps:
      - name: Security checks failed
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "  ❌ PUBLISHING BLOCKED"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "📋 Commit: ${{ github.event.workflow_run.head_sha }}"
          echo "🔗 Workflow: ${{ github.event.workflow_run.html_url }}"
          echo "📊 Conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo ""
          echo "Security Scans workflow did not pass."
          echo ""
          echo "This blocks publishing because security checks include:"
          echo "  - Commit signature verification"
          echo "  - Vulnerability scanning"
          echo "  - Secret detection"
          echo "  - Code security analysis"
          echo ""
          echo "Review the Security Scans workflow run for details."
          echo ""
          exit 1

  check-version:
    needs: verify-security-passed
    runs-on: ubuntu-latest
    # workflow_run trigger already filters by branch, no extra guard needed
    outputs:
      sdk-version-changed: ${{ steps.check-sdk.outputs.changed }}
      sdk-new-version: ${{ steps.check-sdk.outputs.version }}
      vercel-ai-provider-version-changed: ${{ steps.check-vercel-ai-provider.outputs.changed }}
      vercel-ai-provider-new-version: ${{ steps.check-vercel-ai-provider.outputs.version }}
      cli-version-changed: ${{ steps.check-cli.outputs.changed }}
      cli-new-version: ${{ steps.check-cli.outputs.version }}
      python-version-changed: ${{ steps.check-python.outputs.changed }}
      python-new-version: ${{ steps.check-python.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Must specify ref for workflow_run trigger - github.sha is not the triggering commit
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check SDK version
        id: check-sdk
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "📦 SDK version: $CURRENT_VERSION"

          # Get published version from npm (or 0.0.0 if not published yet)
          NPM_VERSION=$(npm view @cortexmemory/sdk version 2>/dev/null || echo "0.0.0")
          echo "📚 npm version: $NPM_VERSION"

          # Compare versions (publish if package.json > npm)
          if [ "$CURRENT_VERSION" != "$NPM_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "✅ New SDK version detected: $NPM_VERSION → $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  SDK already published at $CURRENT_VERSION, skipping"
          fi

      - name: Check Vercel AI Provider version
        id: check-vercel-ai-provider
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(node -p "require('./packages/vercel-ai-provider/package.json').version")
          echo "📦 Vercel AI Provider version: $CURRENT_VERSION"

          # Get published version from npm (or 0.0.0 if not published yet)
          NPM_VERSION=$(npm view @cortexmemory/vercel-ai-provider version 2>/dev/null || echo "0.0.0")
          echo "📚 npm version: $NPM_VERSION"

          # Compare versions (publish if package.json > npm)
          if [ "$CURRENT_VERSION" != "$NPM_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "✅ New Vercel AI Provider version detected: $NPM_VERSION → $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  Vercel AI Provider already published at $CURRENT_VERSION, skipping"
          fi

      - name: Check CLI version
        id: check-cli
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(node -p "require('./packages/cortex-cli/package.json').version")
          echo "📦 CLI version: $CURRENT_VERSION"

          # Get published version from npm (or 0.0.0 if not published yet)
          NPM_VERSION=$(npm view @cortexmemory/cli version 2>/dev/null || echo "0.0.0")
          echo "📚 npm version: $NPM_VERSION"

          # Compare versions (publish if package.json > npm)
          if [ "$CURRENT_VERSION" != "$NPM_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "✅ New CLI version detected: $NPM_VERSION → $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  CLI already published at $CURRENT_VERSION, skipping"
          fi

      - name: Check Python SDK version
        id: check-python
        run: |
          # Get current version from pyproject.toml
          cd cortex-sdk-python
          CURRENT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "📦 Python SDK version: $CURRENT_VERSION"

          # Get published version from PyPI (or 0.0.0 if not published yet)
          pip install --upgrade pip > /dev/null 2>&1
          PYPI_VERSION=$(pip index versions cortex-memory 2>/dev/null | grep "cortex-memory" | head -1 | sed 's/.*(\(.*\))/\1/' || echo "0.0.0")
          echo "📚 PyPI version: $PYPI_VERSION"

          # Compare versions (create tag if pyproject.toml > PyPI)
          if [ "$CURRENT_VERSION" != "$PYPI_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "✅ New Python SDK version detected: $PYPI_VERSION → $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  Python SDK already published at $CURRENT_VERSION, skipping"
          fi

  publish-sdk:
    needs: check-version
    if: needs.check-version.outputs.sdk-version-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for npm OIDC provenance publishing (no NODE_AUTH_TOKEN needed)

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          # Note: Do NOT set registry-url - it creates .npmrc with token auth
          # that conflicts with OIDC trusted publishing

      - name: Ensure npm 11.5.1+ for trusted publishing
        run: |
          npm install -g npm@latest
          echo "npm version: $(npm --version)"

      - name: Install dependencies
        run: npm ci

      - name: Deploy Convex backend
        run: npx convex deploy --yes
        env:
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Generate Convex types
        run: npx convex codegen
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Build package
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Debug OIDC environment
        run: |
          echo "npm version: $(npm --version)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:-(not set)}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+[REDACTED]}"

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
        # Provenance is automatic with trusted publishing (OIDC)

      - name: Create Git Tag
        run: |
          VERSION=${{ needs.check-version.outputs.sdk-new-version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.sdk-new-version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "## Release v$VERSION

          See [CHANGELOG.md](https://github.com/SaintNick1214/Project-Cortex/blob/main/CHANGELOG.md) for details.

          ### Quick Start
          \`\`\`bash
          npm create cortex-memories
          \`\`\`

          ### Install SDK Only
          \`\`\`bash
          npm install @cortexmemory/sdk@$VERSION
          \`\`\`"

      - name: Verify npm publish
        run: |
          echo "Verifying npm registry update..."
          # Retry up to 6 times with 10s delay between retries (check first, then wait)
          for i in 1 2 3 4 5 6; do
            if npm view @cortexmemory/sdk version 2>/dev/null; then
              echo "✅ SDK published successfully!"
              exit 0
            fi
            echo "Attempt $i: Package not yet visible, retrying in 10s..."
            sleep 10
          done
          echo "❌ Package not found after 6 retries - publish verification failed"
          exit 1

      - name: Post-publish summary
        run: |
          VERSION=${{ needs.check-version.outputs.sdk-new-version }}
          echo "════════════════════════════════════════════════════════════"
          echo "  ✅ SDK PUBLISHED!"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "📦 Package: @cortexmemory/sdk@$VERSION"
          echo "📚 npm: https://www.npmjs.com/package/@cortexmemory/sdk"
          echo "🐙 GitHub: https://github.com/SaintNick1214/Project-Cortex/releases/tag/v$VERSION"
          echo ""

  publish-vercel-ai-provider:
    needs: check-version
    if: needs.check-version.outputs.vercel-ai-provider-version-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for npm OIDC provenance publishing (no NODE_AUTH_TOKEN needed)

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Ensure npm 11.5.1+ for trusted publishing
        run: |
          npm install -g npm@latest
          echo "npm version: $(npm --version)"

      - name: Install all workspace dependencies
        run: npm ci

      - name: Deploy Convex backend
        run: npx convex deploy --yes
        env:
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Generate Convex types
        run: npx convex codegen
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Build main SDK first
        run: npm run build

      - name: Build package
        run: npm run build --workspace=@cortexmemory/vercel-ai-provider

      - name: Verify package contents
        run: npm pack --dry-run --workspace=@cortexmemory/vercel-ai-provider

      - name: Debug OIDC environment
        run: |
          echo "npm version: $(npm --version)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:-(not set)}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+[REDACTED]}"

      - name: Publish to npm
        run: |
          cd packages/vercel-ai-provider
          npm publish --access public --ignore-scripts
        # Provenance is automatic with trusted publishing (OIDC)

      - name: Create Git Tag
        run: |
          VERSION=${{ needs.check-version.outputs.vercel-ai-provider-new-version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "vercel-ai-provider-v$VERSION" -m "Release Vercel AI Provider v$VERSION"
          git push origin "vercel-ai-provider-v$VERSION"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.vercel-ai-provider-new-version }}
        run: |
          gh release create "vercel-ai-provider-v$VERSION" \
            --title "Vercel AI Provider v$VERSION" \
            --notes "## Vercel AI Provider v$VERSION

          Add persistent memory to Vercel AI SDK applications with automatic context injection and storage.

          ### Installation
          \`\`\`bash
          npm install @cortexmemory/vercel-ai-provider @cortexmemory/sdk ai convex
          \`\`\`

          ### Quick Start
          \`\`\`typescript
          import { createCortexMemory } from '@cortexmemory/vercel-ai-provider';
          import { openai } from '@ai-sdk/openai';
          import { streamText } from 'ai';

          const cortexMemory = createCortexMemory({
            convexUrl: process.env.CONVEX_URL!,
            memorySpaceId: 'my-chatbot',
            userId: 'user-123'
          });

          const result = await streamText({
            model: cortexMemory(openai('gpt-4.1-nano')),
            messages
          });
          \`\`\`

          ### Documentation
          - [Getting Started](https://github.com/SaintNick1214/Project-Cortex/tree/main/Documentation/08-integrations/vercel-ai-sdk/getting-started.md)
          - [API Reference](https://github.com/SaintNick1214/Project-Cortex/tree/main/Documentation/08-integrations/vercel-ai-sdk/api-reference.md)
          - [Examples](https://github.com/SaintNick1214/Project-Cortex/tree/main/packages/vercel-ai-provider/examples)"

      - name: Verify npm publish
        run: |
          echo "Verifying npm registry update..."
          # Retry up to 6 times with 10s delay between retries (check first, then wait)
          for i in 1 2 3 4 5 6; do
            if npm view @cortexmemory/vercel-ai-provider version 2>/dev/null; then
              echo "✅ Vercel AI Provider published successfully!"
              exit 0
            fi
            echo "Attempt $i: Package not yet visible, retrying in 10s..."
            sleep 10
          done
          echo "❌ Package not found after 6 retries - publish verification failed"
          exit 1

      - name: Post-publish summary
        run: |
          VERSION=${{ needs.check-version.outputs.vercel-ai-provider-new-version }}
          echo "═══════════════════════════════════════════════════════════════"
          echo "  ✅ VERCEL AI PROVIDER PUBLISHED!"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "📦 Package: @cortexmemory/vercel-ai-provider@$VERSION"
          echo "📚 npm: https://www.npmjs.com/package/@cortexmemory/vercel-ai-provider"
          echo "🐙 GitHub: https://github.com/SaintNick1214/Project-Cortex/releases/tag/vercel-ai-provider-v$VERSION"
          echo ""
          echo "🚀 Install: npm install @cortexmemory/vercel-ai-provider"
          echo ""

  publish-cli:
    needs: check-version
    if: needs.check-version.outputs.cli-version-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for npm OIDC provenance publishing (no NODE_AUTH_TOKEN needed)

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Ensure npm 11.5.1+ for trusted publishing
        run: |
          npm install -g npm@latest
          echo "npm version: $(npm --version)"

      - name: Install all workspace dependencies
        run: npm ci

      - name: Deploy Convex backend
        run: npx convex deploy --yes
        env:
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Generate Convex types
        run: npx convex codegen
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Build main SDK first
        run: npm run build

      - name: Sync quickstart template
        run: node packages/cortex-cli/scripts/sync-quickstart-template.js

      - name: Build package
        run: npm run build --workspace=@cortexmemory/cli

      - name: Verify package contents
        run: npm pack --dry-run --workspace=@cortexmemory/cli

      - name: Debug OIDC environment
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "  OIDC DEBUG - CLI Package"
          echo "═══════════════════════════════════════════════════════════════"
          echo "npm version: $(npm --version)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:-(not set)}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+[REDACTED]}"
          echo "GITHUB_ACTIONS: $GITHUB_ACTIONS"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Job: ${{ github.job }}"

      - name: Publish to npm
        run: |
          cd packages/cortex-cli
          npm publish --access public --ignore-scripts
        # Provenance is automatic with trusted publishing (OIDC)

      - name: Create Git Tag
        run: |
          VERSION=${{ needs.check-version.outputs.cli-new-version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "cli-v$VERSION" -m "Release CLI v$VERSION"
          git push origin "cli-v$VERSION"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.cli-new-version }}
        run: |
          gh release create "cli-v$VERSION" \
            --title "Cortex CLI v$VERSION" \
            --notes "## Cortex CLI v$VERSION

          Administrative CLI for managing Cortex Memory deployments.

          ### Installation

          **Via Homebrew (macOS/Linux):**
          \`\`\`bash
          brew install cortex-memory/tap/cli
          \`\`\`

          **Via npm:**
          \`\`\`bash
          npm install -g @cortexmemory/cli
          \`\`\`

          ### Quick Start
          \`\`\`bash
          # Setup
          cortex setup

          # List memory spaces
          cortex spaces list

          # View database statistics
          cortex db stats

          # Manage users
          cortex users list
          \`\`\`

          ### Documentation
          - [README](https://github.com/SaintNick1214/Project-Cortex/tree/main/packages/cortex-cli/README.md)
          - [Changelog](https://github.com/SaintNick1214/Project-Cortex/tree/main/packages/cortex-cli/CHANGELOG.md)"

      - name: Verify npm publish
        run: |
          echo "Verifying npm registry update..."
          # Retry up to 6 times with 10s delay between retries (check first, then wait)
          for i in 1 2 3 4 5 6; do
            if npm view @cortexmemory/cli version 2>/dev/null; then
              echo "✅ CLI published successfully!"
              exit 0
            fi
            echo "Attempt $i: Package not yet visible, retrying in 10s..."
            sleep 10
          done
          echo "❌ Package not found after 6 retries - publish verification failed"
          exit 1

      - name: Post-publish summary
        run: |
          VERSION=${{ needs.check-version.outputs.cli-new-version }}
          echo "════════════════════════════════════════════════════════════"
          echo "  ✅ CLI PUBLISHED!"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "📦 Package: @cortexmemory/cli@$VERSION"
          echo "📚 npm: https://www.npmjs.com/package/@cortexmemory/cli"
          echo "🐙 GitHub: https://github.com/SaintNick1214/Project-Cortex/releases/tag/cli-v$VERSION"
          echo ""
          echo "🚀 Install via npm:      npm install -g @cortexmemory/cli"
          echo "🍺 Install via Homebrew: brew install cortex-memory/tap/cli"
          echo ""

      - name: Update Homebrew tap formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ needs.check-version.outputs.cli-new-version }}
          echo "════════════════════════════════════════════════════════════"
          echo "  Updating Homebrew Tap Formula"
          echo "════════════════════════════════════════════════════════════"

          TARBALL_URL="https://registry.npmjs.org/@cortexmemory/cli/-/cli-${VERSION}.tgz"
          TARBALL_FILE=$(mktemp)

          echo "📦 Version: ${VERSION}"
          echo "🔗 Tarball: ${TARBALL_URL}"

          # Download tarball with retry logic for CDN propagation delay
          MAX_RETRIES=6
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            echo "⬇️  Downloading tarball (attempt $i/$MAX_RETRIES)..."
            
            # Download with HTTP status code check
            HTTP_STATUS=$(curl -sL -w "%{http_code}" -o "$TARBALL_FILE" "${TARBALL_URL}")
            
            if [ "$HTTP_STATUS" = "200" ]; then
              # Verify it's actually a gzip tarball (magic bytes: 1f 8b)
              MAGIC=$(xxd -l 2 -p "$TARBALL_FILE" 2>/dev/null || echo "")
              if [ "$MAGIC" = "1f8b" ]; then
                echo "✅ Valid tarball downloaded (HTTP $HTTP_STATUS)"
                break
              else
                echo "⚠️  Downloaded file is not a valid gzip tarball"
              fi
            else
              echo "⚠️  HTTP $HTTP_STATUS - tarball not yet available"
            fi
            
            if [ $i -lt $MAX_RETRIES ]; then
              echo "   Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          # Final validation
          if [ ! -f "$TARBALL_FILE" ] || [ ! -s "$TARBALL_FILE" ]; then
            echo "❌ Error: Failed to download tarball after $MAX_RETRIES attempts"
            rm -f "$TARBALL_FILE"
            exit 1
          fi

          MAGIC=$(xxd -l 2 -p "$TARBALL_FILE" 2>/dev/null || echo "")
          if [ "$MAGIC" != "1f8b" ]; then
            echo "❌ Error: Downloaded file is not a valid gzip tarball"
            echo "   First 100 bytes:"
            head -c 100 "$TARBALL_FILE" | cat -v
            rm -f "$TARBALL_FILE"
            exit 1
          fi

          # Compute SHA256 from validated tarball
          SHA256=$(shasum -a 256 "$TARBALL_FILE" | cut -d ' ' -f 1)
          rm -f "$TARBALL_FILE"

          if [ -z "$SHA256" ] || [ ${#SHA256} -ne 64 ]; then
            echo "❌ Error: Invalid SHA256 hash computed"
            exit 1
          fi

          echo "🔐 SHA256: ${SHA256}"

          # Get current formula content to build updated version
          echo "📥 Fetching current formula from GitHub..."
          CURRENT_CONTENT=$(gh api repos/Cortex-Memory/homebrew-tap/contents/Formula/cli.rb --jq '.content' | base64 -d)
          
          # Get current HEAD commit OID for the branch (needed for GraphQL mutation)
          HEAD_OID=$(gh api repos/Cortex-Memory/homebrew-tap/git/ref/heads/main --jq '.object.sha')

          # Update formula content using sed
          UPDATED_CONTENT=$(echo "$CURRENT_CONTENT" | \
            sed "s|url \"https://registry.npmjs.org/@cortexmemory/cli/-/cli-[0-9.]*\.tgz\"|url \"https://registry.npmjs.org/@cortexmemory/cli/-/cli-${VERSION}.tgz\"|" | \
            sed "s|sha256 \"[a-f0-9]*\"|sha256 \"${SHA256}\"|")

          echo "✅ Formula updated locally"
          echo "$UPDATED_CONTENT"

          # Check if content actually changed
          if [ "$CURRENT_CONTENT" = "$UPDATED_CONTENT" ]; then
            echo "No changes to formula, skipping commit"
            exit 0
          fi

          # Use GitHub GraphQL API to commit - createCommitOnBranch creates verified commits
          # when called from GitHub Actions (unlike the REST API)
          echo "📤 Pushing formula update via GitHub GraphQL API (creates verified commit)..."
          
          # Base64 encode the content for the GraphQL API
          ENCODED_CONTENT=$(printf '%s' "$UPDATED_CONTENT" | base64 -w 0)

          gh api graphql -f query='
            mutation CreateCommit($nwo: String!, $branch: String!, $oid: GitObjectID!, $message: String!, $path: String!, $contents: Base64String!) {
              createCommitOnBranch(input: {
                branch: {
                  repositoryNameWithOwner: $nwo
                  branchName: $branch
                }
                expectedHeadOid: $oid
                message: {
                  headline: $message
                }
                fileChanges: {
                  additions: [{
                    path: $path
                    contents: $contents
                  }]
                }
              }) {
                commit {
                  url
                  oid
                }
              }
            }
          ' \
            -f nwo="Cortex-Memory/homebrew-tap" \
            -f branch="main" \
            -f oid="$HEAD_OID" \
            -f message="chore: update cli formula to v${VERSION}" \
            -f path="Formula/cli.rb" \
            -f contents="$ENCODED_CONTENT"

          echo "✅ Pushed formula update to homebrew-tap (verified commit)"

  publish-python:
    needs: check-version
    if: needs.check-version.outputs.python-version-changed == 'true'
    runs-on: ubuntu-latest
    environment: pypi # Protected environment (configure in GitHub settings)
    permissions:
      contents: write # Required to create tags
      id-token: write # Required for trusted publishing to PyPI

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          cd cortex-sdk-python
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          cd cortex-sdk-python
          python -m build

      - name: Check distribution
        run: |
          cd cortex-sdk-python
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cortex-sdk-python/dist/
          skip-existing: true
          verbose: true

      - name: Create Git Tag
        run: |
          VERSION=${{ needs.check-version.outputs.python-new-version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "py-v$VERSION" -m "Release Python SDK v$VERSION"
          git push origin "py-v$VERSION"

      - name: Post-publish summary
        run: |
          VERSION=${{ needs.check-version.outputs.python-new-version }}
          echo "════════════════════════════════════════════════════════════"
          echo "  ✅ PYTHON SDK PUBLISHED!"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "📦 Package: cortex-memory@$VERSION"
          echo "📚 PyPI: https://pypi.org/project/cortex-memory/"
          echo "🏷️  Tag: py-v$VERSION"
          echo ""
          echo "🚀 Try it: pip install cortex-memory"
          echo ""
