name: PR Checks

on:
  pull_request:
    branches:
      - main
      - dev
    types: [opened, synchronize, reopened]

# Concurrency: Allow one workflow per PR, cancel in-progress on new commits
# Note: Tests now use parallel-safe isolation (TestRunContext), so concurrent
# test runs within the same workflow are safe.
concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Default permissions: read-only
# Write permissions are granted explicitly at job level
permissions:
  contents: read

# IMPORTANT: Dependabot PRs are explicitly excluded from ALL jobs in this workflow
# Each job has a condition to skip when github.actor == 'dependabot[bot]'
# This prevents Dependabot from triggering any CI actions

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STAGE 1: Detect which files changed (fast, runs first)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  detect-changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    # Skip for Dependabot PRs (they only update dependencies)
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: read
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      python: ${{ steps.filter.outputs.python }}
      vercel-ai-provider: ${{ steps.filter.outputs.vercel-ai-provider }}
      cli: ${{ steps.filter.outputs.cli }}
      convex: ${{ steps.filter.outputs.convex }}
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            typescript:
              - 'src/**'
              - 'tests/**'
              - 'package.json'
              - 'tsconfig.json'
              - 'jest.config.js'
            python:
              - 'cortex-sdk-python/**'
            vercel-ai-provider:
              - 'packages/vercel-ai-provider/**'
            cli:
              - 'packages/cortex-cli/**'
            convex:
              - 'convex-dev/**'

      - name: Show detected changes
        run: |
          echo "📊 Detected Changes:"
          echo "  TypeScript SDK:      ${{ steps.filter.outputs.typescript }}"
          echo "  Python SDK:          ${{ steps.filter.outputs.python }}"
          echo "  Vercel AI Provider:  ${{ steps.filter.outputs.vercel-ai-provider }}"
          echo "  CLI:                 ${{ steps.filter.outputs.cli }}"
          echo "  Convex Backend:      ${{ steps.filter.outputs.convex }}"
          echo ""
          if [[ "${{ steps.filter.outputs.typescript }}" == "true" || \
                "${{ steps.filter.outputs.python }}" == "true" || \
                "${{ steps.filter.outputs.vercel-ai-provider }}" == "true" || \
                "${{ steps.filter.outputs.cli }}" == "true" || \
                "${{ steps.filter.outputs.convex }}" == "true" ]]; then
            echo "✅ Tests will run for changed packages"
          else
            echo "⏭️  No testable changes detected - tests will be skipped"
          fi

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STAGE 2: Deploy Convex & Purge Database (runs once before all tests)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  setup-and-purge:
    name: Deploy & Purge Database
    runs-on: ubuntu-latest
    needs: detect-changes
    # Run if any tests need to run OR if targeting main branch
    if: |
      github.actor != 'dependabot[bot]' && (
        needs.detect-changes.outputs.typescript == 'true' ||
        needs.detect-changes.outputs.python == 'true' ||
        needs.detect-changes.outputs.vercel-ai-provider == 'true' ||
        needs.detect-changes.outputs.cli == 'true' ||
        needs.detect-changes.outputs.convex == 'true' ||
        github.event.pull_request.base.ref == 'main'
      )
    permissions:
      contents: read

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy Convex backend
        run: npx convex deploy --yes
        env:
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Generate Convex types
        run: npx convex codegen
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Purge test database
        run: |
          echo "🧹 Purging all test data before parallel test execution..."
          npx tsx scripts/cleanup-test-data.ts
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      # CLI-dedicated Convex instance (isolated from main SDK tests)
      - name: Deploy CLI Convex backend
        run: npx convex deploy --yes
        env:
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_URL_CLI }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_CLI }}

      - name: Purge CLI test database
        run: |
          echo "🧹 Purging CLI test database..."
          npx tsx scripts/cleanup-test-data.ts
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL_CLI }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_CLI }}

      # Python-dedicated Convex instance (isolated from main SDK and CLI tests)
      - name: Deploy Python Convex backend
        run: npx convex deploy --yes
        env:
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_URL_PY }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_PY }}

      - name: Purge Python test database
        run: |
          echo "🧹 Purging Python test database..."
          npx tsx scripts/cleanup-test-data.ts
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL_PY }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_PY }}

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STAGE 3: Code Quality (runs in parallel with tests after purge)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  code-quality:
    name: Code Quality (Lint & Type Check)
    runs-on: ubuntu-latest
    needs: [detect-changes, setup-and-purge]
    # Run if TypeScript or Python files changed OR if PR is targeting main branch
    # IMPORTANT: Requires setup-and-purge to have SUCCEEDED (not just skipped) to ensure consistency with test jobs
    if: |
      always() &&
      github.actor != 'dependabot[bot]' &&
      needs.setup-and-purge.result == 'success' &&
      needs.detect-changes.result == 'success' &&
      (
        needs.detect-changes.outputs.typescript == 'true' || 
        needs.detect-changes.outputs.python == 'true' ||
        github.event.pull_request.base.ref == 'main'
      )
    permissions:
      contents: read

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Generate Convex types
        run: npx convex codegen
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Run ESLint (TypeScript)
        if: needs.detect-changes.outputs.typescript == 'true' || github.event.pull_request.base.ref == 'main'
        run: npm run lint
        continue-on-error: false

      - name: Type check (TypeScript)
        if: needs.detect-changes.outputs.typescript == 'true' || github.event.pull_request.base.ref == 'main'
        run: npx tsc --noEmit

      - name: Install Python dev dependencies
        if: needs.detect-changes.outputs.python == 'true' || github.event.pull_request.base.ref == 'main'
        run: |
          cd cortex-sdk-python
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Install additional dev deps from requirements-dev.txt (git URL deps can't be in pyproject.toml for PyPI)
          pip install -r requirements-dev.txt

      - name: Type check with mypy (Python)
        if: needs.detect-changes.outputs.python == 'true' || github.event.pull_request.base.ref == 'main'
        run: |
          cd cortex-sdk-python
          mypy cortex --ignore-missing-imports

      - name: Lint with ruff (Python)
        if: needs.detect-changes.outputs.python == 'true' || github.event.pull_request.base.ref == 'main'
        run: |
          cd cortex-sdk-python
          ruff check cortex/

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STAGE 3: TypeScript SDK Tests (sharded across 5 parallel runners)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  test-typescript:
    name: Test TypeScript SDK (Shard ${{ matrix.shard }}/5)
    runs-on: ubuntu-latest
    needs: [detect-changes, setup-and-purge]
    # Run if TypeScript SDK or Convex backend changed OR if PR is targeting main branch
    # IMPORTANT: Requires setup-and-purge to have SUCCEEDED (not just skipped) to ensure database isolation
    if: |
      always() &&
      github.actor != 'dependabot[bot]' &&
      needs.setup-and-purge.result == 'success' &&
      needs.detect-changes.result == 'success' &&
      (
        needs.detect-changes.outputs.typescript == 'true' ||
        needs.detect-changes.outputs.convex == 'true' ||
        github.event.pull_request.base.ref == 'main'
      )
    permissions:
      contents: read

    strategy:
      matrix:
        shard: [1, 2, 3, 4, 5]
      max-parallel: 5 # Run all shards simultaneously (parallel-safe via TestRunContext)
      fail-fast: false # Continue other shards even if one fails

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Convex types
        run: npx convex codegen
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      # Stagger shard starts to reduce concurrent load on shared Convex backend.
      # 2-second increments allow each runner to begin its test subset
      # before the next starts, avoiding thundering herd on database operations.
      - name: Stagger shard start
        run: |
          DELAY=$(( (${{ matrix.shard }} - 1) * 2 ))
          echo "Staggering shard ${{ matrix.shard }} start by ${DELAY}s"
          sleep $DELAY

      - name: Run tests (shard ${{ matrix.shard }}/5)
        run: |
          node --experimental-vm-modules node_modules/jest/bin/jest.js \
            --testPathIgnorePatterns=debug \
            --shard=${{ matrix.shard }}/5 \
            --maxWorkers=75%
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CONVEX_TEST_MODE: managed

      # Only build package once (on shard 1 to avoid redundant builds)
      - name: Build package
        if: matrix.shard == 1
        run: npm run build

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STAGE 3: Python SDK Tests (sharded across 5 shards × 5 Python versions = 25 parallel jobs)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  test-python:
    name: Test Python SDK (Py${{ matrix.python-version }} Shard ${{ matrix.shard }}/5)
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Reduced timeout since each shard runs fewer tests
    needs: [detect-changes, setup-and-purge]
    # Run if Python SDK changed OR if PR is targeting main branch
    # IMPORTANT: Requires setup-and-purge to have SUCCEEDED (not just skipped) to ensure database isolation
    if: |
      always() &&
      github.actor != 'dependabot[bot]' &&
      needs.setup-and-purge.result == 'success' &&
      needs.detect-changes.result == 'success' &&
      (
        needs.detect-changes.outputs.python == 'true' || 
        github.event.pull_request.base.ref == 'main'
      )
    permissions:
      contents: read

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        shard: [1, 2, 3, 4, 5]
      max-parallel: 25 # Run all 25 jobs in parallel (5 versions × 5 shards)
      fail-fast: false

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd cortex-sdk-python
          python -m pip install --upgrade pip
          pip install python-dotenv
          pip install -e ".[dev]"
          # Install pytest-split from requirements-dev.txt (git URL deps can't be in pyproject.toml for PyPI)
          pip install -r requirements-dev.txt

      # Stagger test starts to reduce concurrent load on shared Convex backend.
      # With 25 jobs (5 versions × 5 shards), use 1-second increments to spread load.
      # Job index = (version_index * 5) + (shard - 1), giving 0-24 range.
      - name: Stagger test start
        run: |
          # Map python version to index (0-4)
          case "${{ matrix.python-version }}" in
            "3.10") VERSION_IDX=0 ;;
            "3.11") VERSION_IDX=1 ;;
            "3.12") VERSION_IDX=2 ;;
            "3.13") VERSION_IDX=3 ;;
            "3.14") VERSION_IDX=4 ;;
          esac
          # Calculate unique delay: (version_index * 5 + shard - 1) seconds
          SHARD=${{ matrix.shard }}
          DELAY=$((VERSION_IDX * 5 + SHARD - 1))
          echo "Staggering start by ${DELAY}s (version_idx=${VERSION_IDX}, shard=${SHARD})"
          sleep $DELAY

      - name: Run tests (shard ${{ matrix.shard }}/5)
        run: |
          cd cortex-sdk-python
          pytest tests/ -v --cov=cortex --cov-report=term-missing \
            --splits 5 --group ${{ matrix.shard }}
        env:
          CONVEX_URL_PY: ${{ secrets.CONVEX_URL_PY }}
          CONVEX_URL: ${{ secrets.CONVEX_URL_PY }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_PY }}
          CONVEX_TEST_MODE: managed
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # Only verify version on shard 1 to avoid redundant checks
      - name: Verify Python SDK version matches pyproject.toml
        if: matrix.shard == 1
        run: |
          cd cortex-sdk-python
          echo "🔍 Verifying Python SDK version synchronization..."
          # Use tomllib (3.11+) with tomli fallback (3.10)
          PYPROJECT_VERSION=$(python -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])
          ")
          SDK_VERSION=$(python -c "import cortex; print(cortex.__version__)")
          echo "  pyproject.toml version: $PYPROJECT_VERSION"
          echo "  cortex.__version__:     $SDK_VERSION"
          if [[ "$PYPROJECT_VERSION" != "$SDK_VERSION" ]]; then
            echo ""
            echo "❌ Version mismatch detected!"
            echo "   The SDK __version__ is different from pyproject.toml."
            echo "   This can happen if __version__ was hardcoded instead of read from package metadata."
            exit 1
          fi
          echo "✅ Python SDK version matches pyproject.toml"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STAGE 3: Vercel AI Provider Tests (parallel with other test jobs)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  test-vercel-ai-provider:
    name: Test Vercel AI Provider
    runs-on: ubuntu-latest
    needs: [detect-changes, setup-and-purge]
    # Run if Vercel AI Provider changed OR if PR is targeting main branch
    # IMPORTANT: Requires setup-and-purge to have SUCCEEDED (not just skipped) to ensure database isolation
    if: |
      always() &&
      github.actor != 'dependabot[bot]' &&
      needs.setup-and-purge.result == 'success' &&
      needs.detect-changes.result == 'success' &&
      (
        needs.detect-changes.outputs.vercel-ai-provider == 'true' || 
        github.event.pull_request.base.ref == 'main'
      )
    permissions:
      contents: read

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install all workspace dependencies
        run: npm ci

      - name: Generate Convex types
        run: npx convex codegen
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Build main SDK first
        run: npm run build

      - name: Run Vercel AI Provider tests
        run: npm test --workspace=@cortexmemory/vercel-ai-provider

      - name: Lint Vercel AI Provider
        run: npm run lint --workspace=@cortexmemory/vercel-ai-provider

      - name: Build Vercel AI Provider
        run: npm run build --workspace=@cortexmemory/vercel-ai-provider

      - name: Verify package contents
        run: npm pack --dry-run --workspace=@cortexmemory/vercel-ai-provider

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STAGE 3: CLI Tests (parallel with other test jobs)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  test-cli:
    name: Test Cortex CLI
    runs-on: ubuntu-latest
    needs: [detect-changes, setup-and-purge]
    # Run if CLI changed OR if PR is targeting main branch
    # IMPORTANT: Requires setup-and-purge to have SUCCEEDED (not just skipped) to ensure database isolation
    if: |
      always() &&
      github.actor != 'dependabot[bot]' &&
      needs.setup-and-purge.result == 'success' &&
      needs.detect-changes.result == 'success' &&
      (
        needs.detect-changes.outputs.cli == 'true' || 
        github.event.pull_request.base.ref == 'main'
      )
    permissions:
      contents: read

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install all workspace dependencies
        run: npm ci

      - name: Generate Convex types
        run: npx convex codegen
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Build main SDK first
        run: npm run build

      - name: Run CLI unit tests
        run: npm run test:unit --workspace=@cortexmemory/cli

      - name: Run CLI E2E tests
        run: npm run test:e2e --workspace=@cortexmemory/cli
        env:
          CONVEX_URL_CLI: ${{ secrets.CONVEX_URL_CLI }}
          CONVEX_URL: ${{ secrets.CONVEX_URL_CLI }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_CLI }}

      - name: Lint CLI
        run: npm run lint --workspace=@cortexmemory/cli

      - name: Build CLI
        run: npm run build --workspace=@cortexmemory/cli

      - name: Verify CLI version matches package.json
        run: |
          echo "🔍 Verifying CLI version synchronization..."
          PACKAGE_VERSION=$(node -p "require('./packages/cortex-cli/package.json').version")
          CLI_VERSION=$(node packages/cortex-cli/dist/index.js --version)
          echo "  package.json version: $PACKAGE_VERSION"
          echo "  CLI --version output:  $CLI_VERSION"
          if [[ "$PACKAGE_VERSION" != "$CLI_VERSION" ]]; then
            echo ""
            echo "❌ Version mismatch detected!"
            echo "   The CLI is reporting a different version than package.json."
            echo "   This can happen if VERSION was hardcoded instead of read from package.json."
            exit 1
          fi
          echo "✅ CLI version matches package.json"

      - name: Verify package contents
        run: npm pack --dry-run --workspace=@cortexmemory/cli

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STAGE 4: All Checks Passed (final gate)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  all-checks-passed:
    name: All Checks Passed
    needs:
      [
        detect-changes,
        setup-and-purge,
        test-typescript,
        test-python,
        test-vercel-ai-provider,
        test-cli,
        code-quality,
      ]
    # Skip for Dependabot PRs (they don't run any checks)
    if: always() && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check if all jobs passed
        run: |
          echo "📊 Check Results:"
          echo "  Detect Changes:           ${{ needs.detect-changes.result }}"
          echo "  Setup & Purge:            ${{ needs.setup-and-purge.result }}"
          echo "  Code Quality:             ${{ needs.code-quality.result }}"
          echo "  TypeScript Tests:         ${{ needs.test-typescript.result }}"
          echo "  Python Tests:             ${{ needs.test-python.result }}"
          echo "  Vercel AI Provider Tests: ${{ needs.test-vercel-ai-provider.result }}"
          echo "  CLI Tests:                ${{ needs.test-cli.result }}"
          echo ""
          echo "ℹ️  Security scans run in separate workflow (see Security tab)"
          echo ""

          # Detect changes must pass (it's the root job)
          if [[ "${{ needs.detect-changes.result }}" == "failure" ]]; then
            echo "❌ Detect changes failed"
            exit 1
          fi

          # Setup & purge must pass if it ran
          if [[ "${{ needs.setup-and-purge.result }}" == "failure" ]]; then
            echo "❌ Setup & purge failed"
            exit 1
          fi

          # Validate that tests ran when they should have
          # If setup-and-purge succeeded, tests should not be skipped (they should pass or fail)
          if [[ "${{ needs.setup-and-purge.result }}" == "success" ]]; then
            # Check TypeScript tests
            if [[ ("${{ needs.detect-changes.outputs.typescript }}" == "true" || \
                   "${{ needs.detect-changes.outputs.convex }}" == "true" || \
                   "${{ github.event.pull_request.base.ref }}" == "main") && \
                  "${{ needs.test-typescript.result }}" == "skipped" ]]; then
              echo "❌ TypeScript tests should have run but were skipped"
              exit 1
            fi

            # Check Python tests
            if [[ ("${{ needs.detect-changes.outputs.python }}" == "true" || \
                   "${{ github.event.pull_request.base.ref }}" == "main") && \
                  "${{ needs.test-python.result }}" == "skipped" ]]; then
              echo "❌ Python tests should have run but were skipped"
              exit 1
            fi

            # Check Vercel AI Provider tests
            if [[ ("${{ needs.detect-changes.outputs.vercel-ai-provider }}" == "true" || \
                   "${{ github.event.pull_request.base.ref }}" == "main") && \
                  "${{ needs.test-vercel-ai-provider.result }}" == "skipped" ]]; then
              echo "❌ Vercel AI Provider tests should have run but were skipped"
              exit 1
            fi

            # Check CLI tests
            if [[ ("${{ needs.detect-changes.outputs.cli }}" == "true" || \
                   "${{ github.event.pull_request.base.ref }}" == "main") && \
                  "${{ needs.test-cli.result }}" == "skipped" ]]; then
              echo "❌ CLI tests should have run but were skipped"
              exit 1
            fi

            # Check code quality
            if [[ ("${{ needs.detect-changes.outputs.typescript }}" == "true" || \
                   "${{ needs.detect-changes.outputs.python }}" == "true" || \
                   "${{ github.event.pull_request.base.ref }}" == "main") && \
                  "${{ needs.code-quality.result }}" == "skipped" ]]; then
              echo "❌ Code quality checks should have run but were skipped"
              exit 1
            fi
          fi

          # Code quality must pass OR be skipped (when no changes)
          if [[ "${{ needs.code-quality.result }}" == "failure" ]]; then
            echo "❌ Code quality check failed"
            exit 1
          fi

          # TypeScript tests must pass OR be skipped (when no changes)
          if [[ "${{ needs.test-typescript.result }}" == "failure" ]]; then
            echo "❌ TypeScript tests failed"
            exit 1
          fi

          # Python tests must pass OR be skipped (when no changes)
          if [[ "${{ needs.test-python.result }}" == "failure" ]]; then
            echo "❌ Python tests failed"
            exit 1
          fi

          # Vercel AI Provider tests must pass OR be skipped (when no changes)
          if [[ "${{ needs.test-vercel-ai-provider.result }}" == "failure" ]]; then
            echo "❌ Vercel AI Provider tests failed"
            exit 1
          fi

          # CLI tests must pass OR be skipped (when no changes)
          if [[ "${{ needs.test-cli.result }}" == "failure" ]]; then
            echo "❌ CLI tests failed"
            exit 1
          fi

          echo ""
          echo "✅ All PR checks passed!"
